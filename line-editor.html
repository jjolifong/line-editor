<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도로 라인 편집기</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap');

:root {
  --bg:     #12151f;
  --panel:  #1a1f2e;
  --panel2: #222840;
  --border: #2e3a5a;
  --accent: #4f8ef7;
  --red:    #ff4757;
  --yellow: #ffa502;
  --green:  #2ed573;
  --text:   #e8eaf0;
  --text2:  #7a8aaa;
  --font:   'Noto Sans KR', sans-serif;
  --mono:   'JetBrains Mono', monospace;
  --r:      8px;
  --shadow: 0 4px 20px rgba(0,0,0,0.5);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); }

#app { display: flex; flex-direction: column; height: 100vh; }

/* ── API키 입력바 ── */
#apibar {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px;
  background: #0d1018; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#apibar label { font-size: 11px; color: var(--text2); white-space: nowrap; font-weight: 600; }
#vworld-key {
  flex: 1; padding: 5px 10px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--panel2);
  color: var(--text); font-size: 12px; font-family: var(--mono);
  outline: none;
}
#vworld-key:focus { border-color: var(--accent); }
#btn-apply-key {
  padding: 5px 12px; border-radius: 6px;
  background: var(--accent); border: none; color: #fff;
  font-size: 12px; font-weight: 700; cursor: pointer; font-family: var(--font);
}
#btn-apply-key:hover { opacity: 0.85; }
#key-status { font-size: 11px; white-space: nowrap; }
#key-status.ok  { color: var(--green); }
#key-status.err { color: var(--red); }

/* ── 헤더 ── */
#header {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px;
  background: var(--panel); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#header h1 { font-size: 14px; font-weight: 700; }
#header h1 span { color: var(--red); }
#mode-badge {
  margin-left: auto; padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700;
  background: var(--panel2); border: 1px solid var(--border);
  color: var(--text2); transition: all 0.2s;
}
#mode-badge.on { background: var(--red); border-color: var(--red); color: #fff; }

/* ── 툴바 ── */
#toolbar {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px; background: var(--panel);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; flex-wrap: wrap;
}
.tb-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 12px; border-radius: var(--r);
  border: 1px solid var(--border);
  background: var(--panel2); color: var(--text);
  font-size: 12px; font-family: var(--font);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.tb-btn:hover { border-color: var(--accent); color: var(--accent); }
.tb-btn.active { background: var(--red); border-color: var(--red); color: #fff; }
.tb-btn.green { border-color: var(--green); color: var(--green); }
.tb-btn.green:hover { background: var(--green); color: #000; }
.tb-btn.danger { border-color: var(--red); color: var(--red); }
.tb-btn.danger:hover { background: var(--red); color: #fff; }
.sep { width: 1px; height: 26px; background: var(--border); margin: 0 2px; }

/* ── 메인 ── */
#main { flex: 1; display: flex; overflow: hidden; }
#map-wrap { flex: 1; position: relative; min-width: 0; }
#map { width: 100%; height: 100%; background: var(--bg); }

/* 지도 타입 */
#map-type-ctrl {
  position: absolute; top: 10px; left: 46px; z-index: 1000;
  display: flex; border-radius: var(--r); overflow: hidden;
  border: 1px solid var(--border); box-shadow: var(--shadow);
}
.mt-btn {
  padding: 6px 11px; font-size: 11px; font-weight: 600;
  background: var(--panel); color: var(--text2);
  border: none; cursor: pointer; font-family: var(--font); transition: all 0.15s;
}
.mt-btn.active { background: var(--accent); color: #fff; }

#coord-bar {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  background: rgba(18,21,31,0.88); backdrop-filter: blur(6px);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 3px 12px; font-size: 11px; color: var(--text2);
  font-family: var(--mono); pointer-events: none; z-index: 1000; white-space: nowrap;
}

#draw-hint {
  position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
  background: rgba(255,71,87,0.92); border-radius: 8px; padding: 7px 16px;
  font-size: 12px; font-weight: 600; color: #fff;
  pointer-events: none; z-index: 1000; display: none; white-space: nowrap;
}
#draw-hint.show { display: block; }

/* ── 속성 사이드패널 ── */
#attr-panel {
  width: 300px; flex-shrink: 0;
  background: var(--panel); border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: width 0.25s; overflow: hidden;
}
#attr-panel.collapsed { width: 0; }

#attr-header {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#attr-header h3 { font-size: 13px; font-weight: 700; flex: 1; }
#attr-toggle-btn {
  padding: 4px 10px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--panel2);
  color: var(--text2); font-size: 11px; cursor: pointer; font-family: var(--font);
}

/* 라인 목록 */
#line-list {
  flex: 1; overflow-y: auto; padding: 8px;
  display: flex; flex-direction: column; gap: 5px;
}
.line-item {
  padding: 9px 11px; border-radius: var(--r);
  border: 1px solid var(--border); background: var(--panel2);
  cursor: pointer; transition: all 0.15s;
}
.line-item:hover { border-color: var(--red); }
.line-item.selected { border-color: var(--red); background: rgba(255,71,87,0.1); }
.line-item-top { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
.line-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
.line-name { font-size: 12px; font-weight: 600; flex: 1; }
.line-del { font-size: 15px; color: var(--text2); cursor: pointer; padding: 0 3px; }
.line-del:hover { color: var(--red); }
.line-meta { font-size: 10px; color: var(--text2); font-family: var(--mono); }

/* 속성 입력폼 */
#attr-form {
  padding: 14px; border-top: 2px solid var(--red);
  flex-shrink: 0; display: none;
}
#attr-form.show { display: block; }
#attr-form-title {
  font-size: 12px; font-weight: 700; margin-bottom: 12px; color: var(--text2);
}
#attr-form-title span { color: var(--red); font-family: var(--mono); }

.field { margin-bottom: 10px; }
.field label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 4px; font-weight: 600; }
.field input {
  width: 100%; padding: 7px 10px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--bg);
  color: var(--text); font-size: 13px; font-family: var(--font);
  outline: none; transition: border-color 0.15s;
}
.field input:focus { border-color: var(--accent); }
.field input[type=number] { font-family: var(--mono); }

.width-warn { font-size: 11px; margin-top: 4px; padding: 4px 8px; border-radius: 5px; display: none; }
.width-warn.show { display: block; }
.width-warn.fire    { background: rgba(255,71,87,0.15);  color: var(--red);    border: 1px solid rgba(255,71,87,0.3); }
.width-warn.caution { background: rgba(255,165,2,0.15);  color: var(--yellow); border: 1px solid rgba(255,165,2,0.3); }
.width-warn.ok      { background: rgba(46,213,115,0.12); color: var(--green);  border: 1px solid rgba(46,213,115,0.3); }

/* 로드뷰 링크 버튼 */
#btn-roadview {
  width: 100%; padding: 8px; border-radius: var(--r);
  background: var(--panel2); border: 1px solid var(--border);
  color: var(--text2); font-size: 12px; cursor: pointer;
  font-family: var(--font); margin-bottom: 10px; text-align: center;
  transition: all 0.15s;
}
#btn-roadview:hover { border-color: var(--accent); color: var(--accent); }

.attr-actions { display: flex; gap: 8px; margin-top: 12px; }
.btn-save {
  flex: 1; padding: 9px; border-radius: var(--r);
  background: var(--accent); border: none; color: #fff;
  font-size: 13px; font-weight: 700; cursor: pointer; font-family: var(--font);
}
.btn-save:hover { opacity: 0.85; }
.btn-cancel {
  padding: 9px 14px; border-radius: var(--r);
  background: var(--panel2); border: 1px solid var(--border);
  color: var(--text2); font-size: 12px; cursor: pointer; font-family: var(--font);
}
.btn-cancel:hover { color: var(--text); }

/* ── 토스트 ── */
#toast {
  position: fixed; top: 80px; left: 50%;
  transform: translateX(-50%) translateY(-6px);
  background: var(--panel2); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 18px;
  font-size: 12px; color: var(--text);
  opacity: 0; transition: all 0.2s;
  pointer-events: none; z-index: 9999; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.ok   { border-color: var(--green);  color: var(--green); }
#toast.warn { border-color: var(--yellow); color: var(--yellow); }
#toast.err  { border-color: var(--red);    color: var(--red); }

/* Leaflet 커서 */
.drawing-cursor { cursor: crosshair !important; }
.leaflet-container { background: var(--bg) !important; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">

  <!-- API 키 입력바 -->
  <div id="apibar">
    <!-- 🔑 브이월드 API 키 입력란 -->
    <label>🔑 브이월드 API 키</label>
    <input type="text" id="vworld-key"
      placeholder="YOUR_VWORLD_API_KEY — vworld.kr에서 발급">
    <button id="btn-apply-key" onclick="applyVworldKey()">적용</button>
    <span id="key-status">키 미입력</span>
  </div>

  <!-- 헤더 -->
  <div id="header">
    <h1>도로 라인 <span>편집기</span></h1>
    <span id="line-count" style="font-size:11px;color:var(--text2);">라인 0개</span>
    <div id="mode-badge">대기</div>
  </div>

  <!-- 툴바 -->
  <div id="toolbar">
    <button class="tb-btn" id="btn-draw" onclick="toggleDraw()">✏️ 라인 그리기</button>
    <button class="tb-btn" onclick="undoLast()">↩ 실행취소</button>
    <div class="sep"></div>
    <button class="tb-btn green" onclick="exportJSON()">💾 JSON 내보내기</button>
    <button class="tb-btn" onclick="document.getElementById('file-in').click()">📂 불러오기</button>
    <input type="file" id="file-in" accept=".json" style="display:none" onchange="importJSON(event)">
    <div class="sep"></div>
    <button class="tb-btn danger" onclick="clearAll()">🗑 전체삭제</button>
  </div>

  <!-- 메인 -->
  <div id="main">
    <div id="map-wrap">
      <div id="map"></div>
      <div id="map-type-ctrl">
        <button class="mt-btn active" id="btn-base"    onclick="setMapType('base')">🗺 일반</button>
        <button class="mt-btn"        id="btn-sat"     onclick="setMapType('sat')">🛰 위성</button>
        <button class="mt-btn"        id="btn-hybrid"  onclick="setMapType('hybrid')">🔀 하이브리드</button>
      </div>
      <div id="coord-bar">-- , --</div>
      <div id="draw-hint">📍 시작점을 클릭하세요</div>
    </div>

    <!-- 속성 패널 -->
    <div id="attr-panel">
      <div id="attr-header">
        <h3>🛣 라인 목록</h3>
        <span id="attr-count" style="font-size:11px;color:var(--text2);">0개</span>
        <button id="attr-toggle-btn" onclick="toggleAttrPanel()">◀ 닫기</button>
      </div>
      <div id="line-list">
        <div style="padding:20px;text-align:center;color:var(--text2);font-size:12px;">
          ✏️ 라인 그리기로 시작하세요
        </div>
      </div>
      <div id="attr-form">
        <div id="attr-form-title">라인 <span id="attr-line-num">#1</span> 속성 입력</div>
        <button id="btn-roadview" onclick="openRoadview()">
          🔭 이 위치 카카오 로드뷰로 보기 (새 탭)
        </button>
        <div class="field">
          <label>도로 이름 (선택)</label>
          <input type="text" id="attr-name" placeholder="예: 무양공원 앞 도로">
        </div>
        <div class="field">
          <label>도로 전체 폭 (m)</label>
          <input type="number" id="attr-width" min="1" max="50" step="0.5"
            placeholder="예: 6" oninput="checkWidth(this.value)">
          <div class="width-warn" id="width-warn"></div>
        </div>
        <div class="field">
          <label>메모</label>
          <input type="text" id="attr-memo" placeholder="예: 편도1차로, 인도 없음">
        </div>
        <div class="attr-actions">
          <button class="btn-cancel" onclick="cancelAttr()">취소</button>
          <button class="btn-save"   onclick="saveAttr()">저장</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
//  상태
// ═══════════════════════════════════════════════════════
let lines      = [];
let lineCount  = 0;
let drawMode   = false;
let drawStart  = null;
let tempLine   = null;
let tempMarker = null;
let editingId  = null;
let selectedId = null;
let attrOpen   = true;
let vworldKey  = '';
let editingMidLat = null, editingMidLng = null;

let leafletMap;
let baseLayers = {};
let currentBaseKey = 'base';
let lineLayerGroup;

// ═══════════════════════════════════════════════════════
//  지도 초기화
// ═══════════════════════════════════════════════════════
window.addEventListener('load', () => {
  leafletMap = L.map('map', {
    center: [35.175, 126.85],
    zoom: 16,
    zoomControl: true
  });

  // OSM fallback (키 없을 때)
  baseLayers.osm = L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { attribution: '© OpenStreetMap', maxZoom: 19 }
  );
  baseLayers.osm.addTo(leafletMap);

  lineLayerGroup = L.layerGroup().addTo(leafletMap);

  leafletMap.on('click', onMapClick);
  leafletMap.on('mousemove', onMapMove);

  loadLocal();

  // 저장된 키 복원
  const savedKey = localStorage.getItem('vworld_key');
  if (savedKey) {
    document.getElementById('vworld-key').value = savedKey;
    applyVworldKey(true);
  }
});

// ═══════════════════════════════════════════════════════
//  브이월드 API 키 적용
// ═══════════════════════════════════════════════════════
function applyVworldKey(silent = false) {
  const key = document.getElementById('vworld-key').value.trim();
  if (!key) { showToast('API 키를 입력해주세요', 'warn'); return; }

  vworldKey = key;

  // 타일 레이어 생성
  baseLayers.base = L.tileLayer(
    `https://api.vworld.kr/req/wmts/1.0.0/${key}/Base/{z}/{y}/{x}.png`,
    { attribution: '© 브이월드', maxZoom: 19, tms: false }
  );
  baseLayers.sat = L.tileLayer(
    `https://api.vworld.kr/req/wmts/1.0.0/${key}/Satellite/{z}/{y}/{x}.jpeg`,
    { attribution: '© 브이월드', maxZoom: 19, tms: false }
  );
  baseLayers.hybrid = L.tileLayer(
    `https://api.vworld.kr/req/wmts/1.0.0/${key}/Hybrid/{z}/{y}/{x}.png`,
    { attribution: '© 브이월드', maxZoom: 19, tms: false, opacity: 1 }
  );

  // OSM 제거 후 브이월드 기본지도 적용
  if (leafletMap.hasLayer(baseLayers.osm)) {
    leafletMap.removeLayer(baseLayers.osm);
  }

  // 현재 타입으로 전환
  setMapType('base');

  localStorage.setItem('vworld_key', key);

  const statusEl = document.getElementById('key-status');
  statusEl.textContent = '✅ 적용됨';
  statusEl.className = 'ok';

  if (!silent) showToast('브이월드 지도 적용됨', 'ok');
}

// ═══════════════════════════════════════════════════════
//  지도 타입 전환
// ═══════════════════════════════════════════════════════
function setMapType(type) {
  if (!vworldKey) {
    showToast('API 키를 먼저 입력해주세요', 'warn'); return;
  }

  // 위성+하이브리드 조합 처리
  if (leafletMap.hasLayer(baseLayers.base))   leafletMap.removeLayer(baseLayers.base);
  if (leafletMap.hasLayer(baseLayers.sat))    leafletMap.removeLayer(baseLayers.sat);
  if (leafletMap.hasLayer(baseLayers.hybrid)) leafletMap.removeLayer(baseLayers.hybrid);
  if (leafletMap.hasLayer(baseLayers.osm))    leafletMap.removeLayer(baseLayers.osm);

  if (type === 'hybrid') {
    baseLayers.sat.addTo(leafletMap);
    baseLayers.hybrid.addTo(leafletMap);
  } else {
    baseLayers[type].addTo(leafletMap);
  }

  // 라인 레이어를 항상 최상위로
  lineLayerGroup.bringToFront();
  currentBaseKey = type;

  ['btn-base','btn-sat','btn-hybrid'].forEach(id =>
    document.getElementById(id).classList.remove('active')
  );
  document.getElementById(
    { base:'btn-base', sat:'btn-sat', hybrid:'btn-hybrid' }[type]
  ).classList.add('active');
}

// ═══════════════════════════════════════════════════════
//  지도 클릭
// ═══════════════════════════════════════════════════════
function onMapClick(e) {
  if (!drawMode) return;
  const { lat, lng } = e.latlng;

  if (!drawStart) {
    drawStart = e.latlng;
    if (tempMarker) tempMarker.remove();
    tempMarker = L.circleMarker([lat, lng], {
      radius: 6, color: '#ff4757', fillColor: '#ff4757', fillOpacity: 1, weight: 2
    }).addTo(leafletMap);
    setHint('종점을 클릭하세요 (ESC = 취소)');
  } else {
    const end = e.latlng;
    clearTempDraw();

    lineCount++;
    const id = 'L' + Date.now();
    lines.push({
      id, num: lineCount,
      name: '', width: null, memo: '',
      start: { lat: drawStart.lat, lng: drawStart.lng },
      end:   { lat: end.lat,       lng: end.lng },
      confirmed: false
    });
    editingId = id;
    editingMidLat = (drawStart.lat + end.lat) / 2;
    editingMidLng = (drawStart.lng + end.lng) / 2;

    setDrawMode(false);
    renderLines();
    openAttrForm(id);
  }
}

function onMapMove(e) {
  const { lat, lng } = e.latlng;
  document.getElementById('coord-bar').textContent =
    `${lat.toFixed(6)}, ${lng.toFixed(6)}`;

  if (drawMode && drawStart) {
    if (tempLine) tempLine.remove();
    tempLine = L.polyline([drawStart, e.latlng], {
      color: '#ff4757', weight: 2, dashArray: '6,4', opacity: 0.7
    }).addTo(leafletMap);
  }
}

// ═══════════════════════════════════════════════════════
//  그리기 모드
// ═══════════════════════════════════════════════════════
function toggleDraw() { setDrawMode(!drawMode); }

function setDrawMode(on) {
  drawMode = on;
  if (!on) clearTempDraw();
  document.getElementById('mode-badge').textContent = on ? '그리기 중' : '대기';
  document.getElementById('mode-badge').classList.toggle('on', on);
  document.getElementById('btn-draw').classList.toggle('active', on);
  const mapEl = leafletMap.getContainer();
  mapEl.classList.toggle('drawing-cursor', on);
  if (on) { drawStart = null; setHint('📍 시작점을 클릭하세요'); }
  else hideHint();
}

function clearTempDraw() {
  if (tempLine)   { tempLine.remove();   tempLine = null; }
  if (tempMarker) { tempMarker.remove(); tempMarker = null; }
  drawStart = null;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && drawMode) { clearTempDraw(); setDrawMode(false); }
});

function setHint(txt) {
  const el = document.getElementById('draw-hint');
  el.textContent = txt; el.classList.add('show');
}
function hideHint() {
  document.getElementById('draw-hint').classList.remove('show');
}

// ═══════════════════════════════════════════════════════
//  라인 렌더링
// ═══════════════════════════════════════════════════════
function renderLines() {
  lineLayerGroup.clearLayers();

  lines.forEach(line => {
    const s   = [line.start.lat, line.start.lng];
    const end = [line.end.lat,   line.end.lng];
    const isSel = line.id === selectedId;

    // 선택 시 외곽선 효과
    if (isSel) {
      L.polyline([s, end], {
        color: '#fff', weight: 7, opacity: 0.3
      }).addTo(lineLayerGroup);
    }

    // 중앙선 (빨간색)
    const poly = L.polyline([s, end], {
      color: '#ff4757', weight: isSel ? 4 : 3,
      opacity: line.confirmed ? 1 : 0.5,
      dashArray: line.confirmed ? null : '6,4'
    }).addTo(lineLayerGroup);

    poly.on('click', (ev) => {
      L.DomEvent.stopPropagation(ev);
      if (drawMode) return;
      onLineClick(line.id);
    });

    // 시작점
    L.circleMarker(s, {
      radius: 5, color: '#ff4757', fillColor: '#12151f',
      fillOpacity: 1, weight: 2, interactive: false
    }).addTo(lineLayerGroup);

    // 종점
    L.circleMarker(end, {
      radius: 4, color: '#ff4757', fillColor: '#ff4757',
      fillOpacity: 1, weight: 1, interactive: false
    }).addTo(lineLayerGroup);

    // 거리+폭 라벨
    if (line.confirmed) {
      const mid = [
        (line.start.lat + line.end.lat) / 2,
        (line.start.lng + line.end.lng) / 2
      ];
      const dist = calcDist(line.start, line.end);
      const wStr = line.width ? ` · ${line.width}m` : '';
      L.marker(mid, {
        icon: L.divIcon({
          className: '',
          html: `<div style="background:rgba(18,21,31,0.9);border:1px solid #ff4757;
            border-radius:4px;padding:2px 7px;font-size:10px;color:#ff4757;
            font-family:monospace;white-space:nowrap;pointer-events:none;
            transform:translate(-50%,-16px);">#${line.num}${wStr} · ${dist}m</div>`,
          iconSize: [0, 0]
        }),
        interactive: false
      }).addTo(lineLayerGroup);
    }
  });

  updateLineCount();
  updateSideList();
}

// ═══════════════════════════════════════════════════════
//  라인 클릭
// ═══════════════════════════════════════════════════════
function onLineClick(id) {
  if (selectedId === id) {
    const line = lines.find(l => l.id === id);
    if (line && line.confirmed) {
      if (confirm(`라인 #${line.num} "${line.name}" 을 수정하시겠습니까?`)) {
        line.confirmed = false;
        editingId = id;
        editingMidLat = (line.start.lat + line.end.lat) / 2;
        editingMidLng = (line.start.lng + line.end.lng) / 2;
        renderLines();
        openAttrForm(id);
      }
    }
    return;
  }
  selectedId = id;
  const line = lines.find(l => l.id === id);
  if (line) {
    editingMidLat = (line.start.lat + line.end.lat) / 2;
    editingMidLng = (line.start.lng + line.end.lng) / 2;
  }
  renderLines();
  if (line) openAttrForm(id);
}

// ═══════════════════════════════════════════════════════
//  속성 폼
// ═══════════════════════════════════════════════════════
function openAttrForm(id) {
  const line = lines.find(l => l.id === id);
  if (!line) return;
  editingId = id;
  if (!attrOpen) toggleAttrPanel();
  document.getElementById('attr-form').classList.add('show');
  document.getElementById('attr-line-num').textContent = '#' + line.num;
  document.getElementById('attr-name').value  = line.name  || '';
  document.getElementById('attr-width').value = line.width || '';
  document.getElementById('attr-memo').value  = line.memo  || '';
  checkWidth(line.width || '');
}

function cancelAttr() {
  if (editingId) {
    const line = lines.find(l => l.id === editingId);
    if (line && !line.confirmed) {
      lines = lines.filter(l => l.id !== editingId);
      lineCount = lines.length > 0 ? lines[lines.length - 1].num : 0;
    }
  }
  editingId = null; selectedId = null;
  document.getElementById('attr-form').classList.remove('show');
  renderLines();
}

function saveAttr() {
  const width = parseFloat(document.getElementById('attr-width').value);
  if (!width || width <= 0) { showToast('도로 폭을 입력해주세요', 'warn'); return; }
  const line = lines.find(l => l.id === editingId);
  if (!line) return;
  line.name      = document.getElementById('attr-name').value.trim() || `라인 #${line.num}`;
  line.width     = width;
  line.memo      = document.getElementById('attr-memo').value.trim();
  line.confirmed = true;
  editingId = null;
  document.getElementById('attr-form').classList.remove('show');
  renderLines(); saveLocal();
  showToast(`라인 #${line.num} 저장됨 (폭 ${width}m)`, 'ok');
}

function checkWidth(val) {
  const w  = parseFloat(val);
  const el = document.getElementById('width-warn');
  if (!w) { el.className = 'width-warn'; return; }
  if (w < 4) {
    el.textContent = '🚒 소방차 통행 불가 (4m 미만)';
    el.className = 'width-warn show fire';
  } else if (w < 6) {
    el.textContent = '⚠ 양방향 교행 불가 (6m 미만)';
    el.className = 'width-warn show caution';
  } else {
    el.textContent = '✅ 양방향 통행 가능';
    el.className = 'width-warn show ok';
  }
}

// 카카오 로드뷰 새 탭으로 열기
function openRoadview() {
  if (editingMidLat && editingMidLng) {
    window.open(
      `https://map.kakao.com/link/roadview/${editingMidLat},${editingMidLng}`,
      '_blank'
    );
  }
}

// ═══════════════════════════════════════════════════════
//  사이드 패널
// ═══════════════════════════════════════════════════════
function toggleAttrPanel() {
  attrOpen = !attrOpen;
  document.getElementById('attr-panel').classList.toggle('collapsed', !attrOpen);
  document.getElementById('attr-toggle-btn').textContent = attrOpen ? '◀ 닫기' : '▶ 열기';
  setTimeout(() => leafletMap.invalidateSize(), 300);
}

function updateSideList() {
  const container = document.getElementById('line-list');
  document.getElementById('attr-count').textContent = `${lines.filter(l=>l.confirmed).length}개`;

  if (lines.length === 0) {
    container.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text2);font-size:12px;">
      ✏️ 라인 그리기로 시작하세요</div>`;
    return;
  }

  container.innerHTML = lines.map(line => {
    const dist = calcDist(line.start, line.end);
    return `<div class="line-item ${line.id === selectedId ? 'selected' : ''}"
      onclick="onLineClick('${line.id}')">
      <div class="line-item-top">
        <div class="line-dot"></div>
        <div class="line-name">${line.name || '(미저장) #' + line.num}</div>
        <span class="line-del" onclick="event.stopPropagation();deleteLine('${line.id}')">×</span>
      </div>
      <div class="line-meta">
        ${line.confirmed ? `폭 ${line.width}m | ${dist}m` : '⚠ 속성 미입력'}
        ${line.memo ? ' | ' + line.memo : ''}
      </div>
    </div>`;
  }).join('');
}

function deleteLine(id) {
  const line = lines.find(l => l.id === id);
  if (!line) return;
  if (confirm(`라인 #${line.num} "${line.name || '(미저장)'}" 삭제?`)) {
    lines = lines.filter(l => l.id !== id);
    if (selectedId === id) selectedId = null;
    if (editingId === id) {
      editingId = null;
      document.getElementById('attr-form').classList.remove('show');
    }
    renderLines(); saveLocal(); showToast('삭제됨', 'ok');
  }
}

// ═══════════════════════════════════════════════════════
//  실행취소 / 전체삭제
// ═══════════════════════════════════════════════════════
function undoLast() {
  if (drawMode) { setDrawMode(false); return; }
  if (!lines.length) { showToast('삭제할 라인 없음', 'warn'); return; }
  const last = lines[lines.length - 1];
  if (confirm(`라인 #${last.num} "${last.name || '(미저장)'}" 삭제?`)) {
    lines.pop();
    lineCount = lines.length > 0 ? lines[lines.length - 1].num : 0;
    renderLines(); saveLocal(); showToast('삭제됨', 'ok');
  }
}

function clearAll() {
  if (!lines.length) return;
  if (confirm(`전체 ${lines.length}개 라인을 삭제하시겠습니까?`)) {
    lines = []; lineCount = 0; selectedId = null; editingId = null;
    document.getElementById('attr-form').classList.remove('show');
    renderLines(); saveLocal(); showToast('전체 삭제됨', 'ok');
  }
}

// ═══════════════════════════════════════════════════════
//  JSON 내보내기 / 불러오기
// ═══════════════════════════════════════════════════════
function exportJSON() {
  const confirmed = lines.filter(l => l.confirmed);
  if (!confirmed.length) { showToast('저장된 라인 없음', 'warn'); return; }
  const data = {
    version: '2.0', exportedAt: new Date().toISOString(),
    lineCount: confirmed.length,
    lines: confirmed.map(l => ({
      id: l.id, num: l.num, name: l.name,
      start: l.start, end: l.end,
      width: l.width, memo: l.memo,
      distanceM: calcDist(l.start, l.end)
    }))
  };
  const a = document.createElement('a');
  a.href = URL.createObjectURL(
    new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' })
  );
  a.download = `road-lines-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast(`${confirmed.length}개 내보내기 완료`, 'ok');
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const data = JSON.parse(evt.target.result);
      if (!data.lines) throw new Error();
      const merge = lines.length > 0
        ? confirm('기존 라인에 추가할까요?\n(취소 = 기존 삭제 후 불러오기)')
        : false;
      if (!merge) { lines = []; lineCount = 0; }
      data.lines.forEach(l => {
        lineCount++;
        lines.push({ ...l, num: lineCount, confirmed: true,
          id: 'L' + Date.now() + Math.random() });
      });
      renderLines(); saveLocal();
      showToast(`${data.lines.length}개 불러오기 완료`, 'ok');
      if (lines.length) {
        const coords = lines.flatMap(l => [
          [l.start.lat, l.start.lng], [l.end.lat, l.end.lng]
        ]);
        leafletMap.fitBounds(L.latLngBounds(coords), { padding: [40, 40] });
      }
    } catch { showToast('파일 형식 오류', 'err'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ═══════════════════════════════════════════════════════
//  유틸
// ═══════════════════════════════════════════════════════
function calcDist(a, b) {
  const R = 6371000;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLng = (b.lng - a.lng) * Math.PI / 180;
  const x = Math.sin(dLat/2)**2 +
    Math.cos(a.lat*Math.PI/180) * Math.cos(b.lat*Math.PI/180) * Math.sin(dLng/2)**2;
  return Math.round(2 * R * Math.asin(Math.sqrt(x)));
}

function updateLineCount() {
  document.getElementById('line-count').textContent =
    `라인 ${lines.filter(l => l.confirmed).length}개`;
}

let toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 2500);
}

// ═══════════════════════════════════════════════════════
//  로컬스토리지
// ═══════════════════════════════════════════════════════
function saveLocal() {
  localStorage.setItem('line_ed_v3', JSON.stringify({ lines, lineCount }));
}
function loadLocal() {
  try {
    const d = JSON.parse(localStorage.getItem('line_ed_v3') || 'null');
    if (d) { lines = d.lines || []; lineCount = d.lineCount || 0; renderLines(); }
  } catch {}
}
setInterval(saveLocal, 5000);
window.addEventListener('beforeunload', saveLocal);
</script>
